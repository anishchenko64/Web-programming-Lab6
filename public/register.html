<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Реєстрація — Моніторинг підстанції</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #1a2332; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 8px; padding: 40px; width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    h1 { color: #1a2332; font-size: 1.4rem; margin-bottom: 6px; }
    p.sub { color: #666; font-size: 0.85rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.85rem; color: #333; margin-bottom: 4px; font-weight: bold; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.95rem; margin-bottom: 16px; }
    input:focus, select:focus { outline: none; border-color: #2563eb; }
    button { width: 100%; padding: 11px; background: #16a34a; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #15803d; }
    .error { color: #dc2626; font-size: 0.85rem; margin-bottom: 12px; display: none; }
    .success { color: #16a34a; font-size: 0.85rem; margin-bottom: 12px; display: none; }
    .link { text-align: center; margin-top: 16px; font-size: 0.85rem; }
    .link a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ Реєстрація</h1>
    <p class="sub">Система моніторингу підстанції</p>
    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>
    <label>Повне ім'я</label>
    <input type="text" id="name" placeholder="Іванов Іван Іванович">
    <label>Email</label>
    <input type="email" id="email" placeholder="operator@example.com">
    <label>Пароль (мін. 8 символів)</label>
    <input type="password" id="password" placeholder="••••••••">
    <label>Роль</label>
    <select id="role">
      <option value="operator">Оператор (перегляд)</option>
      <option value="dispatcher">Диспетчер (керування)</option>
    </select>
    <button onclick="doRegister()">Зареєструватись</button>
    <div class="link"><a href="/login.html">Вже є акаунт? Увійти</a></div>
  </div>
  <script>
    async function doRegister() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const role = document.getElementById('role').value;
      const errEl = document.getElementById('errorMsg');
      const okEl = document.getElementById('successMsg');
      errEl.style.display = 'none'; okEl.style.display = 'none';
      try {
        const res = await fetch('/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, role })
        });
        const data = await res.json();
        if (res.ok) {
          okEl.textContent = 'Реєстрація успішна! Перенаправлення...';
          okEl.style.display = 'block';
          setTimeout(() => window.location.href = '/login.html', 1500);
        } else {
          const msg = data.errors ? data.errors.map(e => e.msg).join(', ') : data.error;
          errEl.textContent = msg;
          errEl.style.display = 'block';
        }
      } catch (e) {
        errEl.textContent = 'Помилка мережі';
        errEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
